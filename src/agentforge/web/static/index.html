<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentForge</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand-lockup">
      <div class="brand-mark" aria-hidden="true">AF</div>
      <div>
        <h1>AgentForge</h1>
        <p id="statusText" data-i18n="statusLoading">正在检查本地运行状态...</p>
      </div>
    </div>
    <nav class="navlinks" aria-label="API 链接">
      <a href="/health" data-i18n="health">健康</a>
      <a href="/skills" data-i18n="skills">技能</a>
      <a href="/tasksets" data-i18n="tasksets">任务集</a>
      <a href="/traces" data-i18n="traces">追踪</a>
      <button id="languageToggle" class="secondary" type="button">English</button>
    </nav>
  </header>

  <main class="layout">
    <section class="workspace">
      <section class="status-strip" aria-label="工作台状态">
        <div class="status-tile primary">
          <span class="tile-label" data-i18n="runtime">运行时</span>
          <strong id="runtimeValue">-</strong>
        </div>
        <div class="status-tile">
          <span class="tile-label" data-i18n="skillCount">技能</span>
          <strong id="skillCountValue">-</strong>
        </div>
        <div class="status-tile">
          <span class="tile-label" data-i18n="tasksetCount">任务集</span>
          <strong id="tasksetCountValue">-</strong>
        </div>
        <div class="status-tile">
          <span class="tile-label" data-i18n="mode">模式</span>
          <strong id="modeValue">-</strong>
        </div>
      </section>

      <section class="settings-panel">
        <div>
          <h2 data-i18n="runMode">运行模式</h2>
          <p id="modeHint" class="mode-hint" data-i18n="localModeHint">本地确定性模式</p>
        </div>
        <label class="toggle mode-toggle">
          <input id="useProvider" type="checkbox">
          <span data-i18n="useProvider">调用大模型</span>
        </label>
      </section>

      <div class="tabs" role="tablist" aria-label="AgentForge 工作流">
        <button class="tab active" data-tab="chat" type="button" data-i18n="tabChat">对话</button>
        <button class="tab" data-tab="generate" type="button" data-i18n="tabGenerate">生成 Skill</button>
        <button class="tab" data-tab="run" type="button" data-i18n="tabRun">运行 Skill</button>
        <button class="tab" data-tab="evolve" type="button" data-i18n="tabEvolve">演化 Skill</button>
      </div>

      <section id="panel-chat" class="panel active">
        <label for="chatMessage" data-i18n="message">消息</label>
        <textarea id="chatMessage">评审这个后台仪表盘布局的可读性，并给出具体优化建议。</textarea>
        <div class="toolbar">
          <button id="chatSend" type="button" data-i18n="run">运行</button>
          <label class="toggle">
            <input id="chatDebug" type="checkbox">
            <span data-i18n="debug">调试</span>
          </label>
        </div>
      </section>

      <section id="panel-generate" class="panel">
        <label for="generateInput" data-i18n="requirement">需求</label>
        <textarea id="generateInput">生成一个用于后台仪表盘和管理页面的 UI 评审 Skill。</textarea>
        <div class="toolbar">
          <button id="generateSend" type="button" data-i18n="generateSkill">生成 Skill</button>
        </div>
      </section>

      <section id="panel-run" class="panel">
        <div class="field-grid">
          <label>
            <span data-i18n="skill">Skill</span>
            <select id="runSkill"></select>
          </label>
        </div>
        <label for="runInput" data-i18n="taskInput">任务输入</label>
        <textarea id="runInput">评审一个指标密集、标签对比度偏低、操作按钮不清晰的后台仪表盘。</textarea>
        <div class="toolbar">
          <button id="runSend" type="button" data-i18n="runSkill">运行 Skill</button>
        </div>
      </section>

      <section id="panel-evolve" class="panel">
        <div class="field-grid two">
          <label>
            <span data-i18n="skill">Skill</span>
            <select id="evolveSkill"></select>
          </label>
          <label>
            <span data-i18n="taskset">任务集</span>
            <select id="evolveTaskset"></select>
          </label>
          <label>
            <span data-i18n="maxIterations">最大迭代</span>
            <input id="maxIterations" type="number" min="1" max="10" value="1">
          </label>
          <label>
            <span data-i18n="minImprovement">最小提升</span>
            <input id="minImprovement" type="number" step="0.01" value="0.01">
          </label>
        </div>
        <div class="toolbar">
          <button id="evolveSend" type="button" data-i18n="evolveSkill">演化 Skill</button>
        </div>
      </section>

      <section id="result" class="result empty">
        <div id="runRibbon" class="run-ribbon muted">
          <span data-i18n="runIdle">暂无运行</span>
        </div>
        <p data-i18n="emptyResult">运行一个流程后查看结果。</p>
      </section>
    </section>

    <aside class="sidepanel">
      <section class="metric-panel">
        <h2 data-i18n="hqs">HQS</h2>
        <div class="scoreline">
          <span id="responseScore" class="score">-</span>
          <span data-i18n="response">响应</span>
        </div>
        <div class="scorebar"><span id="responseScoreBar"></span></div>
        <div class="scoreline">
          <span id="systemScore" class="score">-</span>
          <span data-i18n="system">系统</span>
        </div>
        <div class="scorebar"><span id="systemScoreBar"></span></div>
      </section>

      <section class="meta-panel">
        <h2 data-i18n="runSummary">运行摘要</h2>
        <dl>
          <dt data-i18n="intent">意图</dt>
          <dd id="intentValue">-</dd>
          <dt data-i18n="plan">计划</dt>
          <dd id="planValue">-</dd>
          <dt data-i18n="skill">Skill</dt>
          <dd id="skillValue">-</dd>
          <dt data-i18n="trace">追踪</dt>
          <dd id="traceValue">-</dd>
        </dl>
      </section>

      <section class="meta-panel">
        <h2 data-i18n="warnings">警告</h2>
        <ul id="warnings" class="list">
          <li data-i18n="none">无</li>
        </ul>
      </section>

      <section class="meta-panel">
        <h2 data-i18n="artifacts">产物</h2>
        <ul id="artifacts" class="list compact">
          <li data-i18n="none">无</li>
        </ul>
      </section>

      <section class="meta-panel">
        <h2 data-i18n="timeline">时间线</h2>
        <ol id="timeline" class="timeline">
          <li data-i18n="timelineEmpty">暂无运行。</li>
        </ol>
      </section>

      <section class="meta-panel drilldown-panel">
        <div class="section-heading">
          <h2 data-i18n="drilldown">钻取视图</h2>
          <span id="drilldownStatus" class="badge muted" data-i18n="runIdle">暂无运行</span>
        </div>
        <div class="drill-tabs" role="tablist" aria-label="可钻取运行详情">
          <button class="drill-tab active" data-drill="trace" type="button" data-i18n="trace">追踪</button>
          <button class="drill-tab" data-drill="hqs" type="button" data-i18n="hqs">HQS</button>
          <button class="drill-tab" data-drill="memory" type="button" data-i18n="memory">记忆</button>
          <button class="drill-tab" data-drill="diff" type="button" data-i18n="skillDiff">Skill Diff</button>
        </div>
        <div id="drilldownContent" class="drilldown-content">
          <p data-i18n="drilldownEmpty">运行一个流程后，可查看追踪、HQS、记忆或 Skill diff。</p>
        </div>
      </section>
    </aside>
  </main>

  <section class="debug-panel">
    <details>
      <summary data-i18n="debugJson">调试 JSON</summary>
      <pre id="debugOutput">{}</pre>
    </details>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
